<script>
const modes = [

  {

    unknowns:['m','v1','v2','d','F'],
    fields:['m','v1','v2','d','F'],
    defaultUnknown:'F'

];

const labels = {
  m:['m','kg','hmotnost péedmátu'],
  v1:['vã','môñsã£ô¿','rychlost na zaáûÀtku'],
  h1:['hã','m','vû§éÀka na zaáûÀtku'],
  v2:['vã','môñsã£ô¿','rychlost na konci'],
  h2:['hã','m','vû§éÀka na konci'],
  v:['v','môñsã£ô¿','poáûÀteánûÙ rychlost dolé₤'],
  h:['h','m','vû§éÀka nad hlûÙnou'],
  d:['d','m','drûÀha prûÀce, napé. 5 cm = 0,05 m'],

  g:['g','môñsã£ôý','tûÙhovûˋ zrychlenûÙ']
};

let mode = 'mechanical';
const values = { g:'9,81' };
const computed = {};
const unknownByMode = { mechanical:'v2', intoWork:'F', throughWood:'F' };
let currentExampleText = '';
const $ = id => document.getElementById(id);

function currentMode(){ return modes.find(m => m.id === mode); }
function unknown(){ return unknownByMode[mode] || currentMode().defaultUnknown; }
function setUnknown(k){
  unknownByMode[mode] = k;
  delete values[k];
  delete computed[k];
  renderFields();
  calculate();
}
function parseNumber(raw){
  const n = parseFloat(String(raw ?? '').trim().replace(',', '.'));
  return Number.isFinite(n) ? n : null;
}
function val(k){ return parseNumber(values[k]); }
function fmt(x,d=3){
  if(!Number.isFinite(x)) return '';
  return Number(x).toLocaleString('cs-CZ',{maximumFractionDigits:d,minimumFractionDigits:0}).replace(/\s/g,'\u202f');
}
function latexNum(x,d=3){
  const out = fmt(x,d).replace(',', '{,}');
  return x < 0 ? `\\left(${out}\\right)` : out;
}
function inputLatex(k){
  const map = {m:'m', v1:'v_1', h1:'h_1', v2:'v_2', h2:'h_2', v:'v', h:'h', d:'d', F:'F', g:'g'};
  return map[k] || k;
}
function energyTerm(speedKey){
  const v = val(speedKey);
  if(v === null) return `\\frac{1}{2}${inputLatex(speedKey)}^2`;
  if(Math.abs(v) < 1e-12) return '0';
  return `\\frac{1}{2}\\cdot ${latexNum(v)}^2`;
}
function heightTerm(heightKey){
  const g = val('g');
  const h = val(heightKey);
  if(h === null) return `g${inputLatex(heightKey)}`;
  if(Math.abs(h) < 1e-12) return '0';
  return `${latexNum(g ?? 9.81)}\\cdot ${latexNum(h)}`;
}
function workTerm(){
  const F = val('F');
  const d = val('d');
  const fl = F === null ? 'F' : latexNum(F);
  const dl = d === null ? 'd' : latexNum(d);
  if(F !== null && Math.abs(F) < 1e-12) return '0';
  if(d !== null && Math.abs(d) < 1e-12) return '0';
  return `${fl}\\cdot ${dl}`;
}
function joinTerms(terms){
  const filtered = terms.filter(t => t !== '0');
  return filtered.length ? filtered.join(' + ') : '0';
}
function renderModes(){
  $('modes').innerHTML = modes.map(m => `<button class="mode ${m.id===mode?'active':''}" data-mode="${m.id}">${m.name}<br><span class="small">${m.short}</span></button>`).join('');
  document.querySelectorAll('.mode').forEach(btn => {
    btn.addEventListener('click', () => {
      mode = btn.dataset.mode;
      currentExampleText = '';
      for(const k in computed) delete computed[k];
      if(!values.g) values.g = '9,81';
      renderModes();
      renderFields();
      calculate();
    });
  });
}
function renderFields(){
  const cfg = currentMode();
  const u = unknown();
  $('fields').innerHTML = cfg.fields.map(k => {
    const l = labels[k];
    const canBeUnknown = cfg.unknowns.includes(k);
    const isUnknown = k === u;
    const readonly = isUnknown ? ' readonly' : '';
    const placeholder = isUnknown ? 'neznûÀmûÀ' : '?';
    const pick = canBeUnknown
      ? `<label class="unknownPick" title="Oznaáit ${l[0]} jako neznûÀmou"><input type="radio" name="unknown" data-unknown="${k}" ${isUnknown?'checked':''}><span>neznûÀmûÀ</span></label>`
      : `<span class="small">konstanta</span>`;
    return `<div class="field ${isUnknown?'unknown':''} ${computed[k]?'computed':''}" id="row_${k}">
      <div class="labelBlock"><label for="${k}"><b>${l[0]}</b><br><span class="small">${l[2]}</span></label>${pick}</div>
      <input type="text" inputmode="decimal" id="${k}" value="${values[k] ?? ''}" placeholder="${placeholder}" autocomplete="off"${readonly}>
      <span class="unit">${l[1]}</span>
    </div>`;
  }).join('');

  cfg.fields.forEach(k => {
    const input = $(k);
    const radio = document.querySelector(`input[data-unknown="${k}"]`);
    if(radio) radio.addEventListener('change', () => setUnknown(k));
    if(k === u) return;
    input.addEventListener('input', e => {
      values[k] = e.target.value;
      currentExampleText = '';
      for(const key in computed){
        delete computed[key];
        if(key === unknown()) delete values[key];
      }
      calculate();
    });
  });
}
function missingInputs(){

}

}
function derivationRows(rows){

  ).join('') + `</div>`;
}
function knownEquation(){
  if(mode === 'mechanical'){
    return `\\[${joinTerms([energyTerm('v1'), heightTerm('h1')])} = ${joinTerms([energyTerm('v2'), heightTerm('h2')])}\\]`;
  }
  if(mode === 'intoWork'){
    const m = val('m');
    const ml = m === null ? 'm' : latexNum(m);
    return `\\[${joinTerms([`${ml}\\cdot ${energyTerm('v')}`, `${ml}\\cdot ${heightTerm('h')}`])} = ${workTerm()}\\]`;
  }
  const m = val('m');
  const ml = m === null ? 'm' : latexNum(m);
  return `\\[${ml}\\cdot ${energyTerm('v1')} = ${workTerm()} + ${ml}\\cdot ${energyTerm('v2')}\\]`;
}
function termZero(key){
  const u = unknown();
  if(key === 'k1') return u !== 'v1' && val('v1') === 0;
  if(key === 'p1') return u !== 'h1' && val('h1') === 0;
  if(key === 'k2') return u !== 'v2' && val('v2') === 0;
  if(key === 'p2') return u !== 'h2' && val('h2') === 0;
  if(key === 'k') return u !== 'v' && val('v') === 0;
  if(key === 'p') return u !== 'h' && val('h') === 0;
  if(key === 'mk') return u !== 'v' && val('v') === 0;
  if(key === 'mp') return u !== 'h' && val('h') === 0;
  if(key === 'mk1') return u !== 'v1' && val('v1') === 0;
  if(key === 'mk2') return u !== 'v2' && val('v2') === 0;
  if(key === 'w') return (u !== 'F' && val('F') === 0) || (u !== 'd' && val('d') === 0);
  return false;
}
function symbolicTerm(key){
  const map = {
    k1:'\\frac{1}{2}v_1^2',
    p1:'g\\cdot h_1',
    k2:'\\frac{1}{2}v_2^2',
    p2:'g\\cdot h_2',
    k:'\\frac{1}{2}v^2',
    p:'g\\cdot h',
    mk:'\\frac{1}{2}m v^2',
    mp:'m\\cdot g\\cdot h',
    mk1:'\\frac{1}{2}m v_1^2',
    mk2:'\\frac{1}{2}m v_2^2',
    w:'F\\cdot d'
  };
  return map[key] || key;
}
function doubledTerm(key){
  const map = {
    k1:'v_1^2',

    p2:'2\\cdot g\\cdot h_2',

    mk:'m v^2',

    mk2:'m v_2^2',

  return map[key] || `2\\cdot ${symbolicTerm(key)}`;
}
function symbolicSide(keys){
  const terms = keys.filter(k => !termZero(k)).map(symbolicTerm);
  return terms.length ? terms.join(' + ') : '0';
}
function doubledSide(keys){
  const terms = keys.filter(k => !termZero(k)).map(doubledTerm);
  return terms.length ? terms.join(' + ') : '0';
}
function simplifiedEquationSymbolic(){
  if(mode === 'mechanical') return `\\[${symbolicSide(['k1','p1'])}=${symbolicSide(['k2','p2'])}\\]`;
  if(mode === 'intoWork') return `\\[${symbolicSide(['mk','mp'])}=${symbolicSide(['w'])}\\]`;

function zeroExplanations(){

  if(mode === 'mechanical'){
    add(termZero('k1'), '\\(v_1=0\\), proto \\(\\frac{1}{2}v_1^2=0\\). Tento álen uéƒ dûÀl nepûÙéÀeme.');
    add(termZero('p1'), '\\(h_1=0\\), proto \\(gh_1=0\\). Tento álen uéƒ dûÀl nepûÙéÀeme.');
    add(termZero('k2'), '\\(v_2=0\\), proto \\(\\frac{1}{2}v_2^2=0\\). Tento álen uéƒ dûÀl nepûÙéÀeme.');
    add(termZero('p2'), '\\(h_2=0\\), proto \\(gh_2=0\\). Tento álen uéƒ dûÀl nepûÙéÀeme.');
  }
  if(mode === 'intoWork'){
    add(termZero('mk'), '\\(v=0\\), proto \\(\\frac{1}{2}mv^2=0\\). Tento álen uéƒ dûÀl nepûÙéÀeme.');
    add(termZero('mp'), '\\(h=0\\), proto \\(mgh=0\\). Tento álen uéƒ dûÀl nepûÙéÀeme.');
    add(termZero('w'), '\\(F=0\\) nebo \\(d=0\\), proto \\(Fd=0\\). Tento álen uéƒ dûÀl nepûÙéÀeme.');
  }
  if(mode === 'throughWood'){
    add(termZero('mk1'), '\\(v_1=0\\), proto \\(\\frac{1}{2}mv_1^2=0\\). Tento álen uéƒ dûÀl nepûÙéÀeme.');
    add(termZero('mk2'), '\\(v_2=0\\), proto \\(\\frac{1}{2}mv_2^2=0\\). Tento álen uéƒ dûÀl nepûÙéÀeme.');
    add(termZero('w'), '\\(F=0\\) nebo \\(d=0\\), proto \\(Fd=0\\). Tento álen uéƒ dûÀl nepûÙéÀeme.');
  }
  if(!rows.length) rows.push('é§ûÀdnûÀ ze zadanû§ch rychlostûÙ, vû§éÀek ani prûÀce nenûÙ nulovûÀ, proto zatûÙm éƒûÀdnû§ álen neodpadne.');
  return rows.map(t => `<p class="small">${t}</p>`).join('');
}
function zeroStepNumber(){

}
function expressionSide(sideKeys, skipKey){
  const terms = sideKeys.filter(k => k !== skipKey && !termZero(k)).map(symbolicTerm);

}
function doubledExpressionSide(sideKeys, skipKey){
  const terms = sideKeys.filter(k => k !== skipKey && !termZero(k)).map(doubledTerm);
  return terms.length ? terms.join(' + ') : '0';
}
function subExpr(total, subtract){
  if(subtract === '0') return total;
  if(total === '0') return `-${subtract.includes('+') ? `\\left(${subtract}\\right)` : subtract}`;
  return `${total}-${subtract.includes('+') ? `\\left(${subtract}\\right)` : subtract}`;
}
function speedVariableFromTerm(term){
  const map = {k1:'v_1', k2:'v_2', k:'v', mk:'v', mk1:'v_1', mk2:'v_2'};

  const isolatedRight = subExpr(other, same);
  const rows = [
    {txt:'Zaáneme uéƒ zjednoduéÀenou rovnicûÙ, kde nulovûˋ áleny nepûÙéÀeme.', eq:start}
  ];
  if(kind === 'speed'){
    const sameDoubled = doubledExpressionSide(unknownOnLeft ? leftKeys : rightKeys, unknownTerm);

    const speed = speedVariableFromTerm(unknownTerm);
    rows.push({txt:'NejdéûÙv celou rovnici vynûÀsobûÙme dváma. Dvojka se propûÙéÀe ke kaéƒdûˋmu álenu.', eq:`${doubledSide(leftKeys)}=${doubledSide(rightKeys)}`});
    rows.push({txt:`OsamostatnûÙme álen s hledanou rychlostûÙ \\(${speed}\\).`, eq:`${doubledUnknownTerm(unknownTerm)}=${isolatedDoubled}`});
    if(hasMassInSpeedTerm(unknownTerm)){

      rows.push({txt:'OdmocnûÙme, protoéƒe hledûÀme rychlost.', eq:`${speed}=\\sqrt{\\frac{${isolatedDoubled}}{m}}`});
    }else{
      rows.push({txt:'OdmocnûÙme, protoéƒe hledûÀme rychlost.', eq:`${speed}=\\sqrt{${isolatedDoubled}}`});
    }
  } else if(kind === 'height'){

    const divisor = unknownTerm === 'mp' ? 'm\\cdot g' : 'g';
    const text = unknownTerm === 'mp' ? 'VydálûÙme souáinem \\(m\\cdot g\\).' : 'VydálûÙme tûÙhovû§m zrychlenûÙm \\(g\\).';

  } else if(kind === 'workF'){

function massRows(){
  if(mode === 'intoWork'){

    return [
      {txt:'Zaáneme uéƒ zjednoduéÀenou rovnicûÙ, kde nulovûˋ áleny nepûÙéÀeme.', eq:`${symbolicSide(['mk','mp'])}=${symbolicSide(['w'])}`},
      {txt:'Z levûˋ strany vytkneme hmotnost \\(m\\).', eq:`m\\left(${energy}\\right)=F\\cdot d`},

    {txt:'áleny s hmotnostûÙ dûÀme na jednu stranu.', eq:`m\\left(${energyLoss}\\right)=F\\cdot d`},
    {txt:'VydálûÙme vû§razem v zûÀvorce.', eq:`m=\\frac{F\\cdot d}{${energyLoss}}`}

function substitutionFor(u, result){
  const finalRow = derivationFor(u).at(-1)?.eq || `${inputLatex(u)}=${latexNum(result)}`;
  const parts = finalRow.split('=');
  const left = parts.shift();
  const right = replaceKnownSymbols(parts.join('='), u);
  return `\\[${left}=${right}=${latexNum(result)}\\]`;
}
function replaceKnownSymbols(expr, u){
  let out = expr;
  const longVars = [['v_1','v1'], ['h_1','h1'], ['v_2','v2'], ['h_2','h2']];
  for(const [latex, key] of longVars){
    if(key !== u && val(key) !== null) out = out.replaceAll(latex, latexNum(val(key)));
  }
  const singleVars = [['g','g'], ['F','F'], ['m','m'], ['d','d'], ['v','v'], ['h','h']];
  for(const [latex, key] of singleVars){
    if(key !== u && val(key) !== null){
      const re = new RegExp(`(?<![A-Za-z\\\\])${latex}(?![A-Za-z_])`, 'g');
      out = out.replace(re, latexNum(val(key)));
    }
  }
  return out;
}
function baseSteps(){

      `<div class="step"><b>2) DosadûÙme vzorce za energie</b><p class="small">Za kinetickou energii dosadûÙme \\(E_k=\\frac{1}{2}mv^2\\), za polohovou energii \\(E_p=mgh\\).</p>\\[\\frac{1}{2}mv_1^2+mgh_1=\\frac{1}{2}mv_2^2+mgh_2\\]</div>`,
      `<div class="step"><b>3) VykrûÀtûÙme hmotnost</b><p class="small">Kaéƒdû§ álen obsahuje hmotnost \\(m\\), proto celou rovnici vydálûÙme hmotnostûÙ. Hmotnost tedy nemusûÙme znûÀt.</p>\\[\\frac{1}{2}v_1^2+gh_1=\\frac{1}{2}v_2^2+gh_2\\]</div>`
    ];
  }
  if(mode === 'intoWork'){
    return [
      `<div class="step"><b>1) ZapûÙéÀeme péemánu energie na prûÀci</b><p class="small">Táleso mûÀ kinetickou a polohovou energii. Tato energie se spotéebuje na prûÀci odporovûˋ sûÙly v hlûÙná.</p>\\[E_k+E_p=W\\]</div>`,
      `<div class="step"><b>2) DosadûÙme vzorce</b><p class="small">Za energii dosadûÙme \\(E_k=\\frac{1}{2}mv^2\\), \\(E_p=mgh\\). PrûÀci odporovûˋ sûÙly zapûÙéÀeme jako \\(W=Fd\\).</p>\\[\\frac{1}{2}mv^2+mgh=F\\cdot d\\]</div>`
    ];

    `<div class="step"><b>2) DosadûÙme vzorce</b><p class="small">Za kinetickou energii dosadûÙme \\(E_k=\\frac{1}{2}mv^2\\). PrûÀci odporovûˋ sûÙly zapûÙéÀeme jako \\(W=Fd\\).</p>\\[\\frac{1}{2}mv_1^2=F\\cdot d+\\frac{1}{2}mv_2^2\\]</div>`

function derivationFor(u){
  if(mode === 'mechanical'){
    if(u === 'v1') return isolateRows(u, ['k1','p1'], ['k2','p2'], 'k1', 'speed');
    if(u === 'v2') return isolateRows(u, ['k1','p1'], ['k2','p2'], 'k2', 'speed');
    if(u === 'h1') return isolateRows(u, ['k1','p1'], ['k2','p2'], 'p1', 'height');
    if(u === 'h2') return isolateRows(u, ['k1','p1'], ['k2','p2'], 'p2', 'height');
  }
  if(mode === 'intoWork'){
    if(u === 'm') return massRows();
    if(u === 'v') return isolateRows(u, ['mk','mp'], ['w'], 'mk', 'speed');
    if(u === 'h') return isolateRows(u, ['mk','mp'], ['w'], 'mp', 'height');
    if(u === 'F') return isolateRows(u, ['mk','mp'], ['w'], 'w', 'workF');
    if(u === 'd') return isolateRows(u, ['mk','mp'], ['w'], 'w', 'workD');
  }
  if(u === 'm') return massRows();
  if(u === 'v1') return isolateRows(u, ['mk1'], ['w','mk2'], 'mk1', 'speed');
  if(u === 'v2') return isolateRows(u, ['mk1'], ['w','mk2'], 'mk2', 'speed');
  if(u === 'F') return isolateRows(u, ['mk1'], ['w','mk2'], 'w', 'workF');
  if(u === 'd') return isolateRows(u, ['mk1'], ['w','mk2'], 'w', 'workD');
  return [];
}
function solve(){
  const u = unknown();
  const g = val('g');
  let result = NaN;
  let error = '';

  if(mode === 'mechanical'){
    const v1 = val('v1'), h1 = val('h1'), v2 = val('v2'), h2 = val('h2');
    if(u === 'v1'){
      const inside = v2*v2 + 2*g*(h2-h1);
      if(inside < -1e-9) error = 'Pod odmocninou vyéÀlo zûÀpornûˋ áûÙslo. Zadanûˋ hodnoty si odporujûÙ.';
      result = Math.sqrt(Math.max(0, inside));
    }
    if(u === 'v2'){
      const inside = v1*v1 + 2*g*(h1-h2);
      if(inside < -1e-9) error = 'Pod odmocninou vyéÀlo zûÀpornûˋ áûÙslo. Táleso by do zadanûˋ vû§éÀky s touto energiûÙ nedoletálo.';
      result = Math.sqrt(Math.max(0, inside));
    }
    if(u === 'h1') result = (0.5*v2*v2 + g*h2 - 0.5*v1*v1) / g;
    if(u === 'h2') result = (0.5*v1*v1 + g*h1 - 0.5*v2*v2) / g;
  }
  if(mode === 'intoWork'){
    const m = val('m'), v = val('v'), h = val('h'), d = val('d'), F = val('F');
    const energyPerMass = 0.5*v*v + g*h;
    if(u === 'v'){
      const inside = (2*F*d - 2*m*g*h) / m;
      if(inside < -1e-9) error = 'Pod odmocninou vyéÀlo zûÀpornûˋ áûÙslo. ZadanûÀ prûÀce nestaáûÙ na zadanou vû§éÀku.';
      result = Math.sqrt(Math.max(0, inside));
    }
    if(u === 'h') result = (F*d - 0.5*m*v*v) / (m*g);
    if(u === 'd'){
      if(Math.abs(F) < 1e-12) error = 'Nelze dálit nulovou odporovou silou.';
      result = (0.5*m*v*v + m*g*h) / F;
    }
    if(u === 'F'){
      if(Math.abs(d) < 1e-12) error = 'Hloubka zarytûÙ nesmûÙ bû§t nulovûÀ, jinak nejde uráit odporovûÀ sûÙla.';
      result = (0.5*m*v*v + m*g*h) / d;
    }
    if(u === 'm'){
      if(Math.abs(energyPerMass) < 1e-12) error = 'Energie je nulovûÀ, z táchto hodnot nejde uráit hmotnost.';
      result = F*d / energyPerMass;
    }
  }
  if(mode === 'throughWood'){
    const m = val('m'), v1 = val('v1'), v2 = val('v2'), d = val('d'), F = val('F');
    const energyLossPerMass = 0.5*v1*v1 - 0.5*v2*v2;
    if(u === 'v1') result = Math.sqrt(Math.max(0, (2*F*d + m*v2*v2) / m));
    if(u === 'v2'){
      const inside = (m*v1*v1 - 2*F*d) / m;
      if(inside < -1e-9) error = 'Pod odmocninou vyéÀlo zûÀpornûˋ áûÙslo. Kulka by se péi takovûˋ prûÀci zastavila déûÙv.';
      result = Math.sqrt(Math.max(0, inside));
    }
    if(u === 'd'){
      if(Math.abs(F) < 1e-12) error = 'Nelze dálit nulovou odporovou silou.';
      result = (0.5*m*v1*v1 - 0.5*m*v2*v2) / F;
    }
    if(u === 'F'){
      if(Math.abs(d) < 1e-12) error = 'DrûÀha ve déevá nesmûÙ bû§t nulovûÀ, jinak nejde uráit odporovûÀ sûÙla.';
      result = (0.5*m*v1*v1 - 0.5*m*v2*v2) / d;
    }
    if(u === 'm'){
      if(Math.abs(energyLossPerMass) < 1e-12) error = 'ûbytek kinetickûˋ energie je nulovû§, z táchto hodnot nejde uráit hmotnost.';
      result = F*d / energyLossPerMass;
    }
  }
  return {result, error};
}
function resultUnit(k){
  return labels[k]?.[1] || '';
}
function calculate(){
  const steps = baseSteps();
  const miss = missingInputs();
  const u = unknown();

  if(miss.length){
    $('status').textContent = 'Doplé hodnoty';
    $('equation').innerHTML = `${currentExampleText ? `<p>${currentExampleText}</p>` : ''}ChybûÙ: ${miss.map(k => labels[k][0]).join(', ')}`;
    $('steps').innerHTML = steps.join('');
    typesetMath();
    return;
  }

  const {result, error} = solve();
  const zeroNo = zeroStepNumber();
  steps.push(`<div class="step"><b>${zeroNo}) ZjednoduéÀûÙme nulovûˋ áleny</b><p class="small">NejdéûÙv pouze éekneme, co je rovno nule. áûÙsla zatûÙm nedosazujeme.</p>${zeroExplanations()}${simplifiedEquationSymbolic()}</div>`);
  steps.push(`<div class="step"><b>${zeroNo + 1}) VyjûÀdéûÙme neznûÀmou</b><p class="small">Teá pracujeme poéûÀd jen se symboly. NejdéûÙv neznûÀmou osamostatnûÙme.</p>${derivationRows(derivationFor(u))}</div>`);

  if(error){
    $('status').textContent = 'Tady náco nesedûÙ';
    $('equation').innerHTML = `<div class="warn">${error}</div>`;
    $('steps').innerHTML = steps.join('');
    typesetMath();
    return;
  }

  const substitution = substitutionFor(u, result);
  setComputed(u, result);
  renderFields();
  steps.push(`<div class="step"><b>${zeroNo + 2}) DosadûÙme a spoáûÙtûÀme</b><p class="small">Aéƒ teá dosazujeme konkrûˋtnûÙ áûÙsla do vyjûÀdéenûˋho vztahu.</p>${substitution}</div>`);
  steps.push(`<div class="step"><b>${zeroNo + 3}) Vû§sledek</b><p class="small">Vû§sledek zapûÙéÀeme s jednotkou.</p>\\[${inputLatex(u)}=${latexNum(result)}\\,\\mathrm{${resultUnit(u).replace('ôñ','\\cdot ').replace('ã£ô¿','^{-1}')}}\\]</div>`);
  $('status').textContent = `${labels[u][0]} = ${fmt(result)} ${resultUnit(u)}`;
  $('equation').innerHTML = `${currentMode().short}${currentExampleText ? `<p>${currentExampleText}</p>` : ''}`;
  $('steps').innerHTML = steps.join('');
  typesetMath();
}

function rand(min, max){

}

function generateMechanical(){
  const g = 9.81;
  const selectedUnknown = unknown();
  for(let attempt = 0; attempt < 80; attempt++){
    const scenario = pick(['fall','fall','throwDown','throwUp','platforms']);
    let all = {};

    if(scenario === 'fall'){
      all.h1 = randInt(5, 60);

      all.v1 = 0;
      all.v2 = Math.sqrt(2 * g * (all.h1 - all.h2));

      currentExampleText = 'Táleso padûÀ z klidu z uráitûˋ vû§éÀky dolé₤.';
    }
    if(scenario === 'throwDown'){
      all.h1 = randInt(2, 45);
      all.h2 = 0;
      all.v1 = randInt(3, 20);
      all.v2 = Math.sqrt(all.v1 ** 2 + 2 * g * (all.h1 - all.h2));
      candidates = ['v1','v2','h1'];
      currentExampleText = 'Táleso hodûÙme z vû§éÀky smárem dolé₤ a sledujeme dopad.';
    }
    if(scenario === 'throwUp'){
      all.h1 = 0;
      all.v1 = randInt(12, 35);
      const maxH = all.v1 ** 2 / (2 * g);
      all.h2 = Math.max(1, rand(0.25 * maxH, 0.85 * maxH));
      all.v2 = Math.sqrt(Math.max(0, all.v1 ** 2 - 2 * g * all.h2));
      candidates = ['v1','v2','h2'];
      currentExampleText = 'Táleso vyletûÙ vzhé₤ru a v uráitûˋ vû§éÀce mûÀ menéÀûÙ rychlost.';
    }
    if(scenario === 'platforms'){
      all.h1 = randInt(0, 25);
      all.v1 = randInt(4, 24);
      const maxH2 = all.h1 + all.v1 ** 2 / (2 * g) - 1;
      all.h2 = Math.max(0, randInt(0, Math.max(0, Math.floor(maxH2))));
      all.v2 = Math.sqrt(Math.max(0, all.v1 ** 2 + 2 * g * (all.h1 - all.h2)));
      candidates = ['v1','h1','v2','h2'];
      currentExampleText = 'Táleso se pohybuje mezi dváma ré₤znû§mi vû§éÀkami.';

    if(candidates.includes(selectedUnknown)){
      assignKnown(all, selectedUnknown);
      return;
    }
  }

function generateIntoWork(){
  const g = 9.81;
  const selectedUnknown = unknown();
  for(let attempt = 0; attempt < 80; attempt++){
    const scenario = pick(['drop','speed','speed','both']);
    let all = {};
    let candidates = [];
    all.m = rand(0.15, 4);

      all.v = 0;

    if(scenario === 'speed'){
      all.v = randInt(4, 24);
      all.h = 0;
      candidates = ['m','v','d','F'];
      currentExampleText = 'Táleso narazûÙ do hlûÙny uráitou rychlostûÙ bez péedchozûÙho pûÀdu z vû§éÀky.';
    }
    if(scenario === 'both'){
      all.v = randInt(3, 18);

function generateThroughWood(){
  const selectedUnknown = unknown();
  for(let attempt = 0; attempt < 80; attempt++){
    const scenario = pick(['slows','slows','stops']);

    if(scenario === 'stops'){

      currentExampleText = 'Kulka se ve déevá û¤plná zastavûÙ.';
    }else{
      all.v2 = randInt(Math.max(20, Math.round(all.v1 * 0.35)), Math.round(all.v1 * 0.85));
      candidates = ['m','v1','v2','d','F'];

    }
    all.F = all.m * (0.5 * all.v1 ** 2 - 0.5 * all.v2 ** 2) / all.d;
    if(candidates.includes(selectedUnknown)){
