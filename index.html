<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kalorimetrická kalkulačka</title>
<script>
  window.MathJax = {
    tex: { inlineMath: [['\\(','\\)'], ['$', '$']], displayMath: [['\\[','\\]']] },
    svg: { fontCache: 'global' },
    startup: {
      typeset: false,
      ready: () => {
        MathJax.startup.defaultReady();
        window.mathJaxReady = true;
        if (typeof window.typesetMath === 'function') window.typesetMath();
      }
    }
  };
</script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
<style>
:root{
  --bg:#fbf6ee; --panel:#ffffff; --ink:#2b2b2b; --muted:#6f6a63;
  --line:#ead8bf; --accent:#f4bd62; --accent2:#8ccfbd; --ok:#fff2a8;
  --soft:#f7efe3; --bad:#ffe0dd;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif}
.app{display:grid;grid-template-columns:360px 1fr;min-height:100vh}
aside{padding:18px;border-right:1px solid var(--line);background:#fffaf2;position:sticky;top:0;height:100vh;overflow:auto}
main{padding:22px;overflow:auto}
h1{font-size:25px;margin:0 0 12px} h2{font-size:22px;margin:0 0 12px} h3{font-size:18px;margin:18px 0 8px}
.small{font-size:13px;color:var(--muted);line-height:1.35}.pill{display:inline-block;padding:4px 9px;border-radius:999px;background:var(--soft);border:1px solid var(--line);font-size:12px;margin:2px}
.mode{display:block;width:100%;text-align:left;border:1px solid var(--line);border-radius:15px;background:var(--panel);padding:11px 12px;margin:7px 0;cursor:pointer;font-weight:700;color:var(--ink)}
.mode.active{border-color:var(--accent);box-shadow:0 0 0 3px rgba(244,189,98,.25);background:#fff8e8}
.card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:16px;margin:14px 0;box-shadow:0 4px 18px rgba(70,50,20,.05)}
.field{display:grid;grid-template-columns:minmax(120px,1fr) minmax(86px,116px) 48px;gap:8px;align-items:center;margin:8px 0;padding:8px;border-radius:13px;border:1px solid transparent}
.field.unknown{background:#eef9f6;border-color:#8ccfbd}.field.unknown.computed{background:var(--ok);border-color:#ecd25a}.field input[readonly]{background:#fffdf5;font-weight:800;color:#7a4e00}.labelBlock{min-width:0;display:flex;flex-direction:column;gap:6px}.unknownPick{display:inline-flex;align-items:center;align-self:flex-start;gap:6px;font-size:12px;color:#286d60;cursor:pointer;user-select:none;white-space:nowrap;background:#f8fffc;border:1px solid #aee1d1;border-radius:999px;padding:3px 8px;line-height:1.1}.unknownPick input{width:auto;min-width:0;flex:0 0 auto;accent-color:var(--accent2);cursor:pointer;margin:0}
.field.computed{background:var(--ok);border-color:#ecd25a}.field label{font-size:14px;line-height:1.2;min-width:0}.field input{width:100%;min-width:0;padding:9px 8px;border:1px solid var(--line);border-radius:10px;font-size:15px;background:white;color:var(--ink)}
.field input:focus{outline:2px solid rgba(140,207,189,.7);border-color:var(--accent2)}
.field input[list]{background-image:linear-gradient(45deg, transparent 50%, var(--muted) 50%),linear-gradient(135deg, var(--muted) 50%, transparent 50%);background-position:calc(100% - 16px) 50%,calc(100% - 11px) 50%;background-size:5px 5px,5px 5px;background-repeat:no-repeat;padding-right:28px}
.unit{font-size:13px;color:var(--muted)}
.btnrow{display:flex;gap:8px;flex-wrap:wrap}.btn{border:1px solid var(--line);background:white;border-radius:12px;padding:9px 11px;cursor:pointer;font-weight:700}.btn:hover{background:#fff8e8}
.resultBox{background:#f8fffc;border:1px solid #aee1d1;border-radius:22px;padding:18px;margin-bottom:16px}.steps{display:grid;gap:12px}.step{background:white;border:1px solid var(--line);border-left:7px solid var(--accent);border-radius:17px;padding:14px;overflow-x:auto}.step b{display:block;margin-bottom:8px}.deriveRows{display:grid;gap:10px;margin-top:8px}.deriveRow{display:grid;grid-template-columns:34px minmax(150px,1fr) 2fr;gap:12px;align-items:center;background:#fffdf9;border:1px solid var(--line);border-radius:14px;padding:10px}.deriveNo{width:26px;height:26px;border-radius:999px;background:#e8f6ef;border:1px solid #aee1d1;display:flex;align-items:center;justify-content:center;font-weight:800;color:#126b42}.deriveText{font-size:14px;color:var(--muted);line-height:1.25}.deriveMath{overflow-x:auto;text-align:center}.warn{background:var(--bad);border:1px solid #f2a29a;border-radius:14px;padding:10px;margin-top:10px}.muted{color:var(--muted)}
@media(max-width:850px){
  .app{grid-template-columns:1fr}
  aside{height:auto;position:relative;border-right:0;border-bottom:1px solid var(--line)}
}
@media(max-width:650px){
  body{font-size:16px}
  aside{padding:14px}
  main{padding:14px}
  h1{font-size:23px}
  h2{font-size:21px;line-height:1.2}
  .resultBox{padding:14px;border-radius:18px}
  .step{padding:12px;border-left-width:6px;border-radius:16px;overflow:hidden}
  .step>b{font-size:19px;line-height:1.25;margin-bottom:10px}
  .step>mjx-container[display="true"]{overflow-x:auto;overflow-y:hidden;max-width:100%;padding:4px 0;-webkit-overflow-scrolling:touch}
  .deriveRows{gap:12px}
  .deriveRow{
    display:grid;
    grid-template-columns:34px 1fr;
    grid-template-areas:"no text" "math math";
    align-items:center;
    gap:8px 10px;
    padding:12px;
  }
  .deriveNo{grid-area:no;width:31px;height:31px;font-size:18px}
  .deriveText{grid-area:text;font-size:16px;line-height:1.28;color:#5d5851}
  .deriveMath{
    grid-area:math;
    width:100%;
    max-width:100%;
    overflow-x:auto;
    overflow-y:hidden;
    text-align:left;
    padding-top:9px;
    border-top:1px dashed var(--line);
    -webkit-overflow-scrolling:touch;
  }
  .deriveMath mjx-container[display="true"]{
    margin:0!important;
    text-align:left!important;
    min-width:max-content;
    max-width:none;
    padding:2px 0 4px;
  }
}
@media(max-width:430px){
  aside{padding:12px}
  main{padding:10px}
  .card{padding:12px;border-radius:16px}
  .field{grid-template-columns:minmax(98px,1fr) minmax(78px,112px) 42px;gap:6px;padding:7px}
  .field label{font-size:13px}
  .small{font-size:12px}
  .field input{font-size:15px;padding:8px 7px}
  .unknownPick{font-size:12px;padding:3px 7px}
  .unit{font-size:12px}
  .btn{padding:9px 10px}
  .step{padding:11px;border-radius:15px}
  .step>b{font-size:18px}
  .deriveRow{padding:11px;border-radius:13px}
  .deriveText{font-size:15px}
}
</style>
</head>
<body>
<div class="app">
<aside>
  <h1>Kalorimetrická kalkulačka</h1>
  <p class="small">Vyber typ úlohy. Zaškrtni jednu veličinu jako neznámou a doplň ostatní hodnoty. Jakmile je vstupů dostatek, neznámá se automaticky dopočítá ve žlutém poli a vpravo se ukáže vzorový výpočet.</p>
  <div id="modes"></div>
  <div class="card">
    <h3>Vstupní veličiny</h3>
    <div id="fields"></div>
    <div class="btnrow">
      <button class="btn" id="randomExample">Generovat náhodný příklad</button>
      <button class="btn" id="clearAll">Smazat vše</button>
    </div>
  </div>
</aside>
<main>
  <div class="resultBox">
    <h2 id="status">Zadej hodnoty</h2>
    <div id="equation" class="muted"></div>
  </div>
  <div class="steps" id="steps"></div>
</main>
</div>
<script>
const modes = [
 {id:'mix', name:'1) Bez kalorimetru, bez skupenské přeměny'},
 {id:'mixCal', name:'2) V kalorimetru, bez skupenské přeměny'},
 {id:'melt', name:'3) Tání / tuhnutí'},
 {id:'boil', name:'4) Vypařování / kondenzace'}
];
const labels = {
 m1:['m₁','kg','hmotnost teplejší látky'], c1:['c₁','J·kg⁻¹·K⁻¹','měrná tepelná kapacita teplejší látky'], t1:['t₁','°C','počáteční teplota teplejší látky'],
 m2:['m₂','kg','hmotnost chladnější látky'], c2:['c₂','J·kg⁻¹·K⁻¹','měrná tepelná kapacita chladnější látky'], t2:['t₂','°C','počáteční teplota chladnější látky'],
 m3:['m₃','kg','hmotnost 3. části'], t3:['t₃','°C','počáteční teplota 3. části'],
 t:['t','°C','výsledná teplota'], Ck:['Cₖ','J·K⁻¹','tepelná kapacita kalorimetru'], tk:['tₖ','°C','počáteční teplota kalorimetru'],
 cIce:['cₗ','J·kg⁻¹·K⁻¹','měrná tepelná kapacita ledu'],
 cWater:['cᵥ','J·kg⁻¹·K⁻¹','měrná tepelná kapacita vody'],
 cSteam:['cₚ','J·kg⁻¹·K⁻¹','měrná tepelná kapacita páry'],
 tM:['tₜ','°C','teplota tání/tuhnutí'],
 tB:['tᵥ','°C','teplota varu/kondenzace'],
 lT:['lₜ','J·kg⁻¹','měrné skupenské teplo tání/tuhnutí'],
 lV:['lᵥ','J·kg⁻¹','měrné skupenské teplo vypařování/kondenzace'],
 tFinal:['t','°C','výsledná teplota']
};
const phaseFieldLabels = {
 melt: {
   m1:['mₗ','kg','hmotnost ledu'], t1:['tₗ','°C','počáteční teplota ledu'],
   m2:['mᵥ','kg','hmotnost vody'], t2:['tᵥ₀','°C','počáteční teplota vody']
 },
 boil: {
   m1:['mᵥ','kg','hmotnost vody'], t1:['tᵥ₀','°C','počáteční teplota vody'],
   m2:['mₚ','kg','hmotnost páry'], t2:['tₚ','°C','počáteční teplota páry']
 }
};
function labelFor(k){
  if((mode==='melt' || mode==='boil') && phaseFieldLabels[mode] && phaseFieldLabels[mode][k]) return phaseFieldLabels[mode][k];
  return labels[k];
}

const heatCapacities = [
  ['voda', 4180], ['led', 2100], ['pára', 2000], ['hliník', 900], ['sklo', 840],
  ['beton', 880], ['železo / ocel', 460], ['měď', 383], ['mosaz', 380],
  ['zinek', 390], ['stříbro', 235], ['olovo', 130], ['rtuť', 140],
  ['líh / ethanol', 2400], ['olej', 2000]
];
function heatCapacityDatalist(id){
  return `<datalist id="${id}">` + heatCapacities.map(([name,c]) => `<option value="${c}" label="${name} — ${c} J·kg⁻¹·K⁻¹"></option>`).join('') + `</datalist>`;
}
const visible = {
 mix:['m1','c1','t1','m2','c2','t2','t'],
 mixCal:['m1','c1','t1','m2','c2','t2','Ck','tk','t'],
 melt:['m1','t1','m2','t2','cIce','cWater','tM','lT','tFinal'],
 boil:['m1','t1','m2','t2','cWater','cSteam','tB','lV','tFinal']
};
let mode='mix';
const values = {}; const computed = {}; let typingTimer=null;
const unknownByMode = {mix:'t', mixCal:'t', melt:'tFinal', boil:'tFinal'};
function currentUnknown(){
  const keys = visible[mode] || [];
  if(!keys.includes(unknownByMode[mode])) unknownByMode[mode] = keys.includes('t') ? 't' : keys[keys.length-1];
  return unknownByMode[mode];
}
function selectUnknown(k){
  const previous = currentUnknown();
  if(previous && computed[previous]){ delete values[previous]; delete computed[previous]; }
  unknownByMode[mode]=k;
  delete values[k];
  delete computed[k];
  renderFields();
  calculate();
}
const $ = id => document.getElementById(id);
function fmt(x,d=2){ if(!isFinite(x)) return ''; return Number(x).toLocaleString('cs-CZ',{maximumFractionDigits:d,minimumFractionDigits:d}).replace(/\s/g,'\u202f'); }
function latexNum(x,d=2){ return fmt(x,d).replace(',', '{,}'); }
function latexTerm(x,d=2){ const s=latexNum(x,d); return Number(x)<0 ? `\\left(${s}\\right)` : s; }
function val(k){ const v = parseFloat(String(values[k]??'').replace(',','.')); return Number.isFinite(v)?v:null; }
function setComputed(k,v){
  if(k!==currentUnknown()) return false;
  if(isFinite(v)){
    values[k]=String(Math.round(v*100)/100).replace('.',',');
    computed[k]=true;
    return true;
  }
  return false;
}
function clearSelectedComputed(){
  const k=currentUnknown();
  if(computed[k]){ delete values[k]; delete computed[k]; }
}
function clearComputed(){ for(const k of Object.keys(computed)){ if(computed[k]) delete values[k]; } for(const k in computed) delete computed[k]; renderFields(); calculate(); }
function clearAll(){ for(const k in values) delete values[k]; for(const k in computed) delete computed[k]; renderFields(); calculate(); }
function renderModes(){ $('modes').innerHTML=modes.map(m=>`<button class="mode ${m.id===mode?'active':''}" data-mode="${m.id}">${m.name}</button>`).join(''); document.querySelectorAll('.mode').forEach(b=>b.onclick=()=>{mode=b.dataset.mode; currentUnknown(); for(const k in computed){delete values[k]; delete computed[k];} renderModes(); renderFields(); calculate();}); }
function renderFields(){
 const keys=visible[mode];
 const u=currentUnknown();
 $('fields').innerHTML=keys.map(k=>{
   const l=labelFor(k);
   const listId = (k==='c1'||k==='c2'||k==='cIce'||k==='cWater'||k==='cSteam') ? `list_${k}` : '';
   const listAttr = listId ? ` list="${listId}" title="Můžeš napsat vlastní hodnotu nebo vybrat látku ze seznamu."` : '';
   const dl = listId ? heatCapacityDatalist(listId) : '';
   const checked = k===u ? ' checked' : '';
   const readOnly = k===u ? ' readonly' : '';
   const placeholder = k===u ? 'neznámá' : '?';
   return `<div class="field ${k===u?'unknown':''} ${computed[k]?'computed':''}" id="row_${k}"><div class="labelBlock"><label for="${k}"><b>${l[0]}</b><br><span class="small">${l[2]}</span></label><label class="unknownPick" title="Označit ${l[0]} jako jedinou neznámou"><input type="checkbox" data-unknown="${k}"${checked}><span>neznámá</span></label></div><input inputmode="decimal" id="${k}" value="${values[k]??''}" placeholder="${placeholder}" autocomplete="off"${listAttr}${readOnly}>${dl}<span class="unit">${l[1]}</span></div>`
 }).join('');
 keys.forEach(k=>{
   const input=$(k);
   const box=document.querySelector(`input[data-unknown="${k}"]`);
   box.addEventListener('change',e=>{ if(e.target.checked || k!==currentUnknown()) selectUnknown(k); else e.target.checked=true; });
   if(k===u) return;
   input.addEventListener('input',e=>{values[k]=e.target.value; computed[k]=false; clearSelectedComputed(); clearTimeout(typingTimer); typingTimer=setTimeout(calculate,80);});
   if(k==='c1'||k==='c2'){
     const openList=()=>{ try{ if(input.showPicker) input.showPicker(); }catch(e){} };
     input.addEventListener('focus',()=>setTimeout(openList,40));
     input.addEventListener('click',()=>setTimeout(openList,40));
   }
 });
}
function variableLatex(k){
 const map={m1:'m_1',c1:'c_1',t1:'t_1',m2:'m_2',c2:'c_2',t2:'t_2',m3:'m_3',t3:'t_3',t:'t',Ck:'C_k',tk:'t_k',cIce:'c_l',cWater:'c_v',cSteam:'c_p',tM:'t_t',tB:'t_v',lT:'l_t',lV:'l_v',tFinal:'t'};
 return map[k] || k;
}
function linearFormulaFor(x, includeCal){
 const calA = includeCal ? '+C_k(t-t_k)' : '';
 const calB = includeCal ? '-C_k(t-t_k)' : '';
 const calC = includeCal ? '+C_kt_k' : '';
 const calD = includeCal ? '+C_k' : '';
 const formulas={
   t:`t=\\frac{m_1c_1t_1+m_2c_2t_2${calC}}{m_1c_1+m_2c_2${calD}}`,
   t1:`t_1=t+\\frac{m_2c_2(t-t_2)${calA}}{m_1c_1}`,
   t2:`t_2=t-\\frac{m_1c_1(t_1-t)${calB}}{m_2c_2}`,
   m1:`m_1=\\frac{m_2c_2(t-t_2)${calA}}{c_1(t_1-t)}`,
   m2:`m_2=\\frac{m_1c_1(t_1-t)${calB}}{c_2(t-t_2)}`,
   c1:`c_1=\\frac{m_2c_2(t-t_2)${calA}}{m_1(t_1-t)}`,
   c2:`c_2=\\frac{m_1c_1(t_1-t)${calB}}{m_2(t-t_2)}`,
   Ck:`C_k=\\frac{m_1c_1(t_1-t)-m_2c_2(t-t_2)}{t-t_k}`,
   tk:`t_k=t-\\frac{m_1c_1(t_1-t)-m_2c_2(t-t_2)}{C_k}`
 };
 return formulas[x] || '';
}

function linearDerivationFor(x, includeCal){
 const base = includeCal ? 'm_1c_1(t_1-t)=m_2c_2(t-t_2)+C_k(t-t_k)' : 'm_1c_1(t_1-t)=m_2c_2(t-t_2)';
 const plusCal = includeCal ? '+C_k(t-t_k)' : '';
 const minusCal = includeCal ? '-C_k(t-t_k)' : '';
 const expCal = includeCal ? '+C_kt-C_kt_k' : '';
 const numCal = includeCal ? '+C_kt_k' : '';
 const facCal = includeCal ? '+C_k' : '';
 const A = `m_1c_1(t_1-t)`;
 const B = `m_2c_2(t-t_2)`;
 const C = `C_k(t-t_k)`;
 const arr={
  t:[
   {txt:'Výchozí kalorimetrická rovnice', eq:base},
   {txt:'Rozeznásobíme závorky na obou stranách', eq:`m_1c_1t_1-m_1c_1t=m_2c_2t-m_2c_2t_2${expCal}`},
   {txt:'Přičteme člen m_1c_1t k oběma stranám', eq:`m_1c_1t_1=m_1c_1t+m_2c_2t-m_2c_2t_2${expCal}`},
   {txt:'Přičteme člen m_2c_2t_2 k oběma stranám', eq:`m_1c_1t_1+m_2c_2t_2=m_1c_1t+m_2c_2t${includeCal?'+C_kt-C_kt_k':''}`},
   ...(includeCal ? [{txt:'Přičteme člen C_kt_k k oběma stranám', eq:`m_1c_1t_1+m_2c_2t_2+C_kt_k=m_1c_1t+m_2c_2t+C_kt`}] : []),
   {txt:'Vytkneme společné t na pravé straně', eq:`m_1c_1t_1+m_2c_2t_2${numCal}=t(m_1c_1+m_2c_2${facCal})`},
   {txt:'Vydělíme celý výraz závorkou u t', eq:linearFormulaFor('t',includeCal)}
  ],
  t1:[
   {txt:'Výchozí kalorimetrická rovnice', eq:base},
   {txt:'Rozeznásobíme závorku s t_1 na levé straně', eq:`m_1c_1t_1-m_1c_1t=m_2c_2(t-t_2)${plusCal}`},
   {txt:'Přičteme člen m_1c_1t k oběma stranám', eq:`m_1c_1t_1=m_2c_2(t-t_2)${plusCal}+m_1c_1t`},
   {txt:'Vydělíme celý výraz součinem m_1c_1', eq:`t_1=\\frac{m_2c_2(t-t_2)${plusCal}+m_1c_1t}{m_1c_1}`},
   {txt:'Oddělíme člen s t', eq:linearFormulaFor('t1',includeCal)}
  ],
  t2:[
   {txt:'Výchozí kalorimetrická rovnice', eq:base},
   ...(includeCal ? [{txt:'Odečteme člen C_k(t-t_k) od obou stran', eq:`m_1c_1(t_1-t)-C_k(t-t_k)=m_2c_2(t-t_2)`}] : []),
   {txt:'Prohodíme strany, aby byl člen s t_2 vlevo', eq:`m_2c_2(t-t_2)=m_1c_1(t_1-t)${minusCal}`},
   {txt:'Vydělíme celý výraz součinem m_2c_2', eq:`t-t_2=\\frac{m_1c_1(t_1-t)${minusCal}}{m_2c_2}`},
   {txt:'Odečteme t od obou stran', eq:`-t_2=\\frac{m_1c_1(t_1-t)${minusCal}}{m_2c_2}-t`},
   {txt:'Vynásobíme rovnici číslem -1', eq:linearFormulaFor('t2',includeCal)}
  ],
  m1:[
   {txt:'Výchozí kalorimetrická rovnice', eq:base},
   ...(includeCal ? [{txt:'Odečteme člen C_k(t-t_k) od obou stran', eq:`m_1c_1(t_1-t)-C_k(t-t_k)=m_2c_2(t-t_2)`},
                 {txt:'Přičteme člen C_k(t-t_k) k oběma stranám', eq:`m_1c_1(t_1-t)=m_2c_2(t-t_2)+C_k(t-t_k)`}] : []),
   {txt:'Člen s m_1 je už osamostatněný', eq:`m_1c_1(t_1-t)=m_2c_2(t-t_2)${plusCal}`},
   {txt:'Vydělíme celý výraz součinem c_1(t_1-t)', eq:linearFormulaFor('m1',includeCal)}
  ],
  m2:[
   {txt:'Výchozí kalorimetrická rovnice', eq:base},
   ...(includeCal ? [{txt:'Odečteme člen C_k(t-t_k) od obou stran', eq:`m_1c_1(t_1-t)-C_k(t-t_k)=m_2c_2(t-t_2)`}] : []),
   {txt:'Prohodíme strany, aby byl člen s m_2 vlevo', eq:`m_2c_2(t-t_2)=m_1c_1(t_1-t)${minusCal}`},
   {txt:'Vydělíme celý výraz součinem c_2(t-t_2)', eq:linearFormulaFor('m2',includeCal)}

   {txt:'Výchozí kalorimetrická rovnice', eq:base},
   ...(includeCal ? [{txt:'Odečteme člen C_k(t-t_k) od obou stran', eq:`m_1c_1(t_1-t)-C_k(t-t_k)=m_2c_2(t-t_2)`},
                 {txt:'Přičteme člen C_k(t-t_k) k oběma stranám', eq:`m_1c_1(t_1-t)=m_2c_2(t-t_2)+C_k(t-t_k)`}] : []),
   {txt:'Přeskupíme součiny u c_1', eq:`c_1\\,m_1(t_1-t)=m_2c_2(t-t_2)${plusCal}`},
   {txt:'Vydělíme celý výraz součinem m_1(t_1-t)', eq:linearFormulaFor('c1',includeCal)}
  ],
  c2:[
   {txt:'Výchozí kalorimetrická rovnice', eq:base},
   ...(includeCal ? [{txt:'Odečteme člen C_k(t-t_k) od obou stran', eq:`m_1c_1(t_1-t)-C_k(t-t_k)=m_2c_2(t-t_2)`}] : []),
   {txt:'Prohodíme strany a přeskupíme součiny u c_2', eq:`c_2\\,m_2(t-t_2)=m_1c_1(t_1-t)${minusCal}`},
   {txt:'Vydělíme celý výraz součinem m_2(t-t_2)', eq:linearFormulaFor('c2',includeCal)}
  ],
  Ck:[
   {txt:'Výchozí kalorimetrická rovnice', eq:base},
   {txt:'Odečteme člen m_2c_2(t-t_2) od obou stran', eq:`m_1c_1(t_1-t)-m_2c_2(t-t_2)=C_k(t-t_k)`},
   {txt:'Prohodíme strany, aby bylo C_k vlevo', eq:`C_k(t-t_k)=m_1c_1(t_1-t)-m_2c_2(t-t_2)`},
   {txt:'Vydělíme celý výraz závorkou (t-t_k)', eq:linearFormulaFor('Ck',includeCal)}
  ],

   {txt:'Prohodíme strany, aby byl člen s t_k vlevo', eq:`C_k(t-t_k)=m_1c_1(t_1-t)-m_2c_2(t-t_2)`},
   {txt:'Vydělíme celý výraz součinem C_k', eq:`t-t_k=\\frac{m_1c_1(t_1-t)-m_2c_2(t-t_2)}{C_k}`},
   {txt:'Odečteme t od obou stran', eq:`-t_k=\\frac{m_1c_1(t_1-t)-m_2c_2(t-t_2)}{C_k}-t`},

}
function derivationHtml(x, includeCal){

}



function linearSubstitutionFor(x, includeCal){
 const n=(k,d=2)=>latexNum(val(k),d);
 const c1n=n('c1',0), c2n=n('c2',0);
 const calPlus = includeCal ? `+${n('Ck',0)}\\cdot(${n('t')}-${n('tk')})` : '';
 const calMinus = includeCal ? `-${n('Ck',0)}\\cdot(${n('t')}-${n('tk')})` : '';
 const calNum = includeCal ? `+${n('Ck',0)}\\cdot ${n('tk')}` : '';
 const calDen = includeCal ? `+${n('Ck',0)}` : '';
 const parts={
   t:`\\frac{${n('m1')}\\cdot ${c1n}\\cdot ${n('t1')}+${n('m2')}\\cdot ${c2n}\\cdot ${n('t2')}${calNum}}{${n('m1')}\\cdot ${c1n}+${n('m2')}\\cdot ${c2n}${calDen}}`,
   t1:`${n('t')}+\\frac{${n('m2')}\\cdot ${c2n}\\cdot(${n('t')}-${n('t2')})${calPlus}}{${n('m1')}\\cdot ${c1n}}`,
   t2:`${n('t')}-\\frac{${n('m1')}\\cdot ${c1n}\\cdot(${n('t1')}-${n('t')})${calMinus}}{${n('m2')}\\cdot ${c2n}}`,
   m1:`\\frac{${n('m2')}\\cdot ${c2n}\\cdot(${n('t')}-${n('t2')})${calPlus}}{${c1n}\\cdot(${n('t1')}-${n('t')})}`,
   m2:`\\frac{${n('m1')}\\cdot ${c1n}\\cdot(${n('t1')}-${n('t')})${calMinus}}{${c2n}\\cdot(${n('t')}-${n('t2')})}`,
   c1:`\\frac{${n('m2')}\\cdot ${c2n}\\cdot(${n('t')}-${n('t2')})${calPlus}}{${n('m1')}\\cdot(${n('t1')}-${n('t')})}`,
   c2:`\\frac{${n('m1')}\\cdot ${c1n}\\cdot(${n('t1')}-${n('t')})${calMinus}}{${n('m2')}\\cdot(${n('t')}-${n('t2')})}`,
   Ck:`\\frac{${n('m1')}\\cdot ${c1n}\\cdot(${n('t1')}-${n('t')})-${n('m2')}\\cdot ${c2n}\\cdot(${n('t')}-${n('t2')})}{${n('t')}-${n('tk')}}`,
   tk:`${n('t')}-\\frac{${n('m1')}\\cdot ${c1n}\\cdot(${n('t1')}-${n('t')})-${n('m2')}\\cdot ${c2n}\\cdot(${n('t')}-${n('t2')})}{${n('Ck',0)}}`
 };
 return parts[x] || '';
}
function solveLinear(includeCal){
 let changed=false; const steps=[];
 const keys = includeCal?['m1','c1','t1','m2','c2','t2','Ck','tk','t']:['m1','c1','t1','m2','c2','t2','t'];
 let solvedKey = null;
 const x=currentUnknown();
 if(computed[x]){ delete values[x]; delete computed[x]; }
 let m1=val('m1'),c1=val('c1'),t1=val('t1'),m2=val('m2'),c2=val('c2'),t2=val('t2'),Ck=includeCal?val('Ck'):0,tk=includeCal?val('tk'):0,t=val('t');
 const missingInputs = keys.filter(k=>k!==x && val(k)==null);
 if(keys.includes(x) && missingInputs.length===0){ let r=null;
   if(x==='t') r=(m1*c1*t1+m2*c2*t2+(includeCal?Ck*tk:0))/(m1*c1+m2*c2+(includeCal?Ck:0));
   if(x==='t1') r=(m2*c2*(t-t2)+(includeCal?Ck*(t-tk):0))/(m1*c1)+t;
   if(x==='t2') r=t-(m1*c1*(t1-t)-(includeCal?Ck*(t-tk):0))/(m2*c2);
   if(x==='m1') r=(m2*c2*(t-t2)+(includeCal?Ck*(t-tk):0))/(c1*(t1-t));
   if(x==='m2') r=(m1*c1*(t1-t)-(includeCal?Ck*(t-tk):0))/(c2*(t-t2));
   if(x==='c1') r=(m2*c2*(t-t2)+(includeCal?Ck*(t-tk):0))/(m1*(t1-t));
   if(x==='c2') r=(m1*c1*(t1-t)-(includeCal?Ck*(t-tk):0))/(m2*(t-t2));
   if(includeCal && x==='Ck') r=(m1*c1*(t1-t)-m2*c2*(t-t2))/(t-tk);
   if(includeCal && x==='tk') r=t-(m1*c1*(t1-t)-m2*c2*(t-t2))/Ck;
   if(r!=null && isFinite(r)){ changed=setComputed(x,r); solvedKey=x; }
 }
 const eq = includeCal ? '\\[m_1c_1(t_1-t)=m_2c_2(t-t_2)+C_k(t-t_k)\\]' : '\\[m_1c_1(t_1-t)=m_2c_2(t-t_2)\\]';
 steps.push(`<div class="step"><b>1) Použitá kalorimetrická rovnice</b>${eq}</div>`);
 if(solvedKey && keys.every(k=>val(k)!=null)){
   const unit = labels[solvedKey]?.[1] || '';
   const unitLatex = unit ? `\\,\\mathrm{${unit.replaceAll('·','\\cdot ').replaceAll('⁻','^{-').replaceAll('¹','1}')}}` : '';
   steps.push(`<div class="step"><b>2) Vyjádření vybrané neznámé ${labelFor(solvedKey)[0]} krok za krokem</b>${derivationHtml(solvedKey, includeCal)}</div>`);
   steps.push(`<div class="step"><b>3) Dosazení</b>\\[${variableLatex(solvedKey)}=${linearSubstitutionFor(solvedKey, includeCal)}=${latexNum(val(solvedKey))}${unitLatex}\\]</div>`);
 }
 const tNow=val('t');
 if(tNow!=null && ['m1','c1','t1','m2','c2','t2'].every(k=>val(k)!=null) && (!includeCal || ['Ck','tk'].every(k=>val(k)!=null))){
   steps.push(`<div class="step"><b>${solvedKey?'4':'2'}) Kontrola tepla</b>\\[Q_\\text{odevzdané}=m_1c_1(t_1-t)=${latexNum(val('m1')*val('c1')*(val('t1')-tNow),2)}\\,\\mathrm{J}\\]\\[Q_\\text{přijaté}=${includeCal?'m_2c_2(t-t_2)+C_k(t-t_k)':'m_2c_2(t-t_2)'}=${latexNum(val('m2')*val('c2')*(tNow-val('t2'))+(includeCal?val('Ck')*(tNow-val('tk')):0),2)}\\,\\mathrm{J}\\]</div>`);
 }
 return {changed, steps, ready:!!solvedKey, missingInputs};
}


function phaseConfig(kind){
  if(kind==='boil'){
    return {
      kind:'boil', title:'Vypařování / kondenzace', refTempKey:'tB',
      baseText:()=>`Převedeme vodu a páru na vodu o teplotě ${fmt(val('tB'))} °C.`,
      components:[['m1','t1'],['m2','t2']],
      required:['cWater','cSteam','tB','lV']
    };
  }
  return {
    kind:'melt', title:'Tání / tuhnutí', refTempKey:'tM',
    baseText:()=>`Převedeme led a vodu na vodu o teplotě ${fmt(val('tM'))} °C.`,
    components:[['m1','t1'],['m2','t2']],
    required:['cIce','cWater','tM','lT']
  };
}
function activePhaseComponents(kind){
 return phaseConfig(kind).components;
}
function phaseMissingInputs(kind, x){
 const cfg=phaseConfig(kind);
 const miss=[];
 for(const k of cfg.required){ if(k!==x && val(k)==null) miss.push(k); }
 for(const [mk,tk] of cfg.components){
   if(mk!==x && val(mk)==null) miss.push(mk);
   if(tk!==x && val(tk)==null) miss.push(tk);
 }
 if(x!=='tFinal' && val('tFinal')==null) miss.push('tFinal');
 return [...new Set(miss)];
}
function getPhaseData(kind, x){
 const data={};
 const cfg=phaseConfig(kind);
 for(const k of cfg.required){
   if(k!==x){ const v=val(k); if(v==null) return null; data[k]=v; }
 }
 data.parts=[];
 for(const [mk,tk] of cfg.components){
   if(mk!==x){ const m=val(mk); if(m==null) return null; data[mk]=m; }
   if(tk!==x){ const t=val(tk); if(t==null) return null; data[tk]=t; }
   data.parts.push([mk,tk]);
 }
 return data;
}
function phaseReferenceText(kind, d){
 if(kind==='melt') return `vodu o teplotě ${fmt(d.tM)} °C`;
 return `vodu o teplotě ${fmt(d.tB)} °C`;
}
function phaseMaterialName(kind, T, d, mk){
 if(kind==='melt') return mk==='m1' ? 'ledu' : 'vody';
 return mk==='m1' ? 'vody' : 'páry';
}
function phaseRowToReference(kind, mk, tk, m, T, d){
 let Q=0, signed=0, role='neutral', segment='water';
 if(kind==='melt'){
   if(mk==='m1'){
     segment='ice';
     Q = m*d.cIce*(d.tM-T) + m*d.lT;
     signed = -Q;
   } else {
     segment='water';
     Q = m*d.cWater*(T-d.tM);
     signed = Q;
   }
 } else {
   if(mk==='m1'){
     segment='water';
     Q = m*d.cWater*(d.tB-T);
     signed = -Q;
   } else {
     segment='steam';
     Q = m*d.cSteam*(T-d.tB) + m*d.lV;
     signed = Q;
   }
 }
 if(signed>1e-9) role='releases';
 else if(signed<-1e-9) role='absorbs';
 return {mk,tk,m,T,Q:Math.abs(Q),signed,role,segment};
}
function phaseTemperatureFromBalance(kind, balance, totalMass, d){
 if(!(totalMass>0)) return null;
 if(kind==='melt'){
   const ref=d.tM;
   if(balance>=0){
     const dt=balance/(totalMass*d.cWater);
     return {t:ref+dt, state:'voda', waterMass:totalMass, iceMass:0, steamMass:0, deltaT:dt,
       note: balance>1e-9 ? 'Voda odevzdala víc tepla, než led potřeboval. Všechen led roztaje a zbytek tepla ohřeje výslednou vodu.' : 'Bilance vyjde přesně nulová: výsledkem je voda při teplotě tání.'};
   }
   const missing=-balance;
   const freezeAll=totalMass*d.lT;
   if(missing<=freezeAll+1e-9){
     const iceMass=Math.min(totalMass, missing/d.lT);
     return {t:ref, state:'led + voda', waterMass:Math.max(0,totalMass-iceMass), iceMass, steamMass:0, deltaT:0,
       note:'Tepla nestačí na roztání všeho ledu. Vyjde směs led + voda, takže teplota zůstane na teplotě tání.'};
   }
   const extra=missing-freezeAll;
   const dt=extra/(totalMass*d.cIce);
   return {t:ref-dt, state:'led', waterMass:0, iceMass:totalMass, steamMass:0, deltaT:dt,
     note:'ΔQ vyšlo záporně tak výrazně, že ztuhne všechna voda a výsledný led se ochladí pod teplotu tání.'};
 }
 const ref=d.tB;
 if(balance>=0){
   const vaporizeAll=totalMass*d.lV;
   if(balance<=vaporizeAll+1e-9){
     const steamMass=Math.min(totalMass, balance/d.lV);
     return {t:ref, state:'voda + pára', waterMass:Math.max(0,totalMass-steamMass), iceMass:0, steamMass, deltaT:0,
       note: balance>1e-9 ? 'Přebytečné teplo vypaří jen část vody. Vyjde směs voda + pára, takže teplota zůstane na teplotě varu.' : 'Bilance vyjde přesně nulová: výsledkem je voda při teplotě varu.'};
   }
   const extra=balance-vaporizeAll;
   const dt=extra/(totalMass*d.cSteam);
   return {t:ref+dt, state:'pára', waterMass:0, iceMass:0, steamMass:totalMass, deltaT:dt,
     note:'Pára vyhrála tak výrazně, že se vypaří všechna voda a výsledná pára se ještě ohřeje nad teplotu varu.'};
 }
 const missing=-balance;
 const dt=missing/(totalMass*d.cWater);
 return {t:ref-dt, state:'voda', waterMass:totalMass, iceMass:0, steamMass:0, deltaT:dt,
   note:'ΔQ vyšlo záporně. Pára zkondenzuje a výsledná voda se ochladí pod teplotu varu.'};
}
function computePhase(kind, d){
 let totalMass=0, balance=0, rows=[];
 for(const [mk,tk] of d.parts){
   const m=Number(d[mk]), T=Number(d[tk]);
   if(!(m>0)) continue;
   const row=phaseRowToReference(kind, mk, tk, m, T, d);
   totalMass += m;
   balance += row.signed;
   rows.push(row);
 }
 if(!(totalMass>0)) return null;
 const final=phaseTemperatureFromBalance(kind, balance, totalMass, d);
 return {totalMass,Qbalance:balance,final,rows};
}
function phaseQFormula(row, kind, d){
 const i=row.mk.replace('m','');
 const m=latexNum(row.m), T=latexTerm(row.T), cW=latexNum(d.cWater,0);
 if(Math.abs(row.Q)<1e-9) return `Q_${i}=0\\,\\mathrm{J}`;
 if(kind==='melt'){
   const cI=latexNum(d.cIce,0), TM=latexTerm(d.tM);
   if(row.segment==='ice'){
     return `Q_${i}=m_${i}c_l(t_t-t_${i})+m_${i}l_t=${m}\\cdot ${cI}\\cdot(${TM}-${T})+${m}\\cdot ${latexNum(d.lT,0)}=${latexNum(row.Q)}\\,\\mathrm{J}`;
   }
   return `Q_${i}=m_${i}c_v(t_${i}-t_t)=${m}\\cdot ${cW}\\cdot(${T}-${TM})=${latexNum(row.Q)}\\,\\mathrm{J}`;
 }
 const TB=latexTerm(d.tB), cS=latexNum(d.cSteam,0);
 if(row.segment==='water'){
   return `Q_${i}=m_${i}c_v(t_v-t_${i})=${m}\\cdot ${cW}\\cdot(${TB}-${T})=${latexNum(row.Q)}\\,\\mathrm{J}`;
 }
 return `Q_${i}=m_${i}c_p(t_${i}-t_v)+m_${i}l_v=${m}\\cdot ${cS}\\cdot(${T}-${TB})+${m}\\cdot ${latexNum(d.lV,0)}=${latexNum(row.Q)}\\,\\mathrm{J}`;
}
function phaseMainEquation(kind){
 return `\\[\\Delta Q=Q_\\text{odevzdané}-Q_\\text{přijaté}\\]`;
}
function phaseDomain(k){
 const ranges={
   m1:[0.001,20], m2:[0.001,20],
   t1:[-80,250], t2:[-80,250], tFinal:[-80,250],
   cIce:[100,5000], cWater:[500,8000], cSteam:[500,5000],
   tM:[-50,50], tB:[30,200], lT:[1000,800000], lV:[10000,3500000]
 };
 return ranges[k] || [-100,500];
}
function solvePhaseNumerically(x, kind){
 const target=val('tFinal');
 if(target==null) return null;
 const baseMissing = phaseMissingInputs(kind, x);
 if(baseMissing.length) return null;
 const [lo,hi]=phaseDomain(x);
 const f=z=>{
   const old=values[x];
   values[x]=String(z);
   const d=getPhaseData(kind, x);
   let out=null;
   if(d){
     d[x]=z;
     const r=computePhase(kind,d);
     if(r) out=r.final.t-target;
   }
   if(old===undefined) delete values[x]; else values[x]=old;
   return Number.isFinite(out)?out:null;
 };
 let best=null, bestAbs=Infinity;
 let prevZ=lo, prevF=f(lo);
 const samples=420;
 for(let i=0;i<=samples;i++){
   const z=lo+(hi-lo)*i/samples;
   const fz=f(z);
   if(fz==null) continue;
   const af=Math.abs(fz);
   if(af<bestAbs){ bestAbs=af; best=z; }
   if(af<1e-6) return z;
   if(prevF!=null && prevF*fz<0){
     let a=prevZ,b=z,fa=prevF;
     for(let j=0;j<80;j++){
       const mid=(a+b)/2, fm=f(mid);
       if(fm==null) break;
       if(Math.abs(fm)<1e-7) return mid;
       if(fa*fm<=0){ b=mid; } else { a=mid; fa=fm; }
     }
     return (a+b)/2;
   }
   prevZ=z; prevF=fz;
 }
 return bestAbs<0.03 ? best : null;
}
function phaseBalanceLatex(r){
 const rel = r.rows.filter(row=>row.role==='releases').map(row=>`Q_${row.mk.replace('m','')}`);
 const abs = r.rows.filter(row=>row.role==='absorbs').map(row=>`Q_${row.mk.replace('m','')}`);
 const left = rel.length ? rel.join('+') : '0';
 const right = abs.length ? abs.join('+') : '0';
 return `\\Delta Q=${left}-(${right})=${latexNum(r.Qbalance)}\\,\\mathrm{J}`;
}
function phaseFinalMath(kind, r, d){
 const f=r.final;
 const m=latexNum(r.totalMass);
 const absQ=latexNum(Math.abs(r.Qbalance));
 const almostZero = Math.abs(r.Qbalance) < 1e-9;
 if(kind==='melt'){
   if(almostZero){
     return `<p>Bilance vyšla nulová. Led právě roztaje na vodu o teplotě tání, takže teplotu už není potřeba dopočítávat.</p>\\[t=t_t=${latexNum(d.tM)}\\,^\\circ\\mathrm{C}\\]`;
   }
   if(r.Qbalance>0){
     const dt=r.Qbalance/(r.totalMass*d.cWater);
     return `<p>Vyjde jediné skupenství: <b>voda</b>. Teprve proto dopočítáme, o kolik se voda ohřeje nad teplotu tání.</p>\\[\\Delta Q=m_\\text{celk}c_v\\Delta t\\]\\[\\Delta t=\\frac{\\Delta Q}{m_\\text{celk}c_v}=\\frac{${latexNum(r.Qbalance)}}{${m}\\cdot ${latexNum(d.cWater,0)}}=${latexNum(dt)}\\,^\\circ\\mathrm{C}\\]\\[t=t_t+\\Delta t=${latexNum(d.tM)}+${latexNum(dt)}=${latexNum(f.t)}\\,^\\circ\\mathrm{C}\\]`;
   }
   const miss=-r.Qbalance;
   const freezeAll=r.totalMass*d.lT;
   if(miss<=freezeAll+1e-9){
     return `<p>\\(\\Delta Q\\) je záporné, ale nestačí na ztuhnutí všeho. Vyjde tedy <b>směs ledu a vody</b>. U směsi se teplota nedopočítává, protože při tání/tuhnutí zůstává na teplotě tání.</p>\\[m_\\text{ledu}=\\frac{|\\Delta Q|}{l_t}=\\frac{${absQ}}{${latexNum(d.lT,0)}}=${latexNum(f.iceMass)}\\,\\mathrm{kg}\\]\\[m_\\text{vody}=m_\\text{celk}-m_\\text{ledu}=${m}-${latexNum(f.iceMass)}=${latexNum(f.waterMass)}\\,\\mathrm{kg}\\]\\[t=t_t=${latexNum(d.tM)}\\,^\\circ\\mathrm{C}\\]`;
   }
   const extra=miss-freezeAll;
   const signedIceDt=-extra/(r.totalMass*d.cIce);
   return `<p>\\(\\Delta Q\\) je záporné tak výrazně, že ztuhne všechna voda. Vyjde jediné skupenství: <b>led</b>. Teď už teplotu dopočítáme, protože výsledný led se ochladí pod teplotu tání.</p>\\[Q_\\text{na ztuhnutí všeho}=m_\\text{celk}l_t=${m}\\cdot ${latexNum(d.lT,0)}=${latexNum(freezeAll)}\\,\\mathrm{J}\\]\\[Q_\\text{navíc}=|\\Delta Q|-m_\\text{celk}l_t=${absQ}-${latexNum(freezeAll)}=${latexNum(extra)}\\,\\mathrm{J}\\]\\[\\Delta t_\\text{ledu}=-\\frac{Q_\\text{navíc}}{m_\\text{celk}c_l}=-\\frac{${latexNum(extra)}}{${m}\\cdot ${latexNum(d.cIce,0)}}=${latexNum(signedIceDt)}\\,^\\circ\\mathrm{C}\\]\\[t=t_t+\\Delta t_\\text{ledu}=${latexNum(d.tM)}${signedIceDt<0?'':'+'}${latexNum(signedIceDt)}=${latexNum(f.t)}\\,^\\circ\\mathrm{C}\\]`;
 }
 if(almostZero){
   return `<p>Bilance vyšla nulová. Pára právě zkondenzuje na vodu o teplotě varu, takže teplotu už není potřeba dopočítávat.</p>\\[t=t_v=${latexNum(d.tB)}\\,^\\circ\\mathrm{C}\\]`;
 }
 if(r.Qbalance>0){
   const vaporizeAll=r.totalMass*d.lV;
   if(r.Qbalance<=vaporizeAll+1e-9){
     return `<p>\\(\\Delta Q\\) je kladné, ale nestačí na vypaření všeho. Vyjde tedy <b>směs vody a páry</b>. U směsi se teplota nedopočítává, protože při vypařování/kondenzaci zůstává na teplotě varu.</p>\\[m_\\text{páry}=\\frac{\\Delta Q}{l_v}=\\frac{${latexNum(r.Qbalance)}}{${latexNum(d.lV,0)}}=${latexNum(f.steamMass)}\\,\\mathrm{kg}\\]\\[m_\\text{vody}=m_\\text{celk}-m_\\text{páry}=${m}-${latexNum(f.steamMass)}=${latexNum(f.waterMass)}\\,\\mathrm{kg}\\]\\[t=t_v=${latexNum(d.tB)}\\,^\\circ\\mathrm{C}\\]`;
   }
   const extra=r.Qbalance-vaporizeAll;
   const signedSteamDt=extra/(r.totalMass*d.cSteam);
   return `<p>\\(\\Delta Q\\) je kladné tak výrazně, že se vypaří všechna voda. Vyjde jediné skupenství: <b>pára</b>. Teď už teplotu dopočítáme, protože výsledná pára se ohřeje nad teplotu varu.</p>\\[Q_\\text{na vypaření všeho}=m_\\text{celk}l_v=${m}\\cdot ${latexNum(d.lV,0)}=${latexNum(vaporizeAll)}\\,\\mathrm{J}\\]\\[Q_\\text{navíc}=\\Delta Q-m_\\text{celk}l_v=${latexNum(r.Qbalance)}-${latexNum(vaporizeAll)}=${latexNum(extra)}\\,\\mathrm{J}\\]\\[\\Delta t_\\text{páry}=\\frac{Q_\\text{navíc}}{m_\\text{celk}c_p}=\\frac{${latexNum(extra)}}{${m}\\cdot ${latexNum(d.cSteam,0)}}=${latexNum(signedSteamDt)}\\,^\\circ\\mathrm{C}\\]\\[t=t_v+\\Delta t_\\text{páry}=${latexNum(d.tB)}+${latexNum(signedSteamDt)}=${latexNum(f.t)}\\,^\\circ\\mathrm{C}\\]`;
 }
 const signedDt=r.Qbalance/(r.totalMass*d.cWater);
 const finalT=d.tB+signedDt;
 return `<p>\\(\\Delta Q\\) je záporné. Pára zkondenzuje a vyjde jediné skupenství: <b>voda</b>. Teď už teplotu dopočítáme, protože výsledná voda se ochladí pod teplotu varu.</p>\\[\\Delta Q=m_\\text{celk}c_v\\Delta t\\]\\[\\Delta t=\\frac{\\Delta Q}{m_\\text{celk}c_v}=\\frac{${latexNum(r.Qbalance)}}{${m}\\cdot ${latexNum(d.cWater,0)}}=${latexNum(signedDt)}\\,^\\circ\\mathrm{C}\\]\\[t=t_v+\\Delta t=${latexNum(d.tB)}${signedDt<0?'':'+'}${latexNum(signedDt)}=${latexNum(finalT)}\\,^\\circ\\mathrm{C}\\]`;
}

function solvePhase(kind){
 const steps=[];
 const x=currentUnknown();
 if(computed[x]){ delete values[x]; delete computed[x]; }
 let missing=phaseMissingInputs(kind, x);
 let solvedKey=null;
 if(missing.length===0){
   if(x==='tFinal'){
     const d=getPhaseData(kind, x);
     if(d){ const r=computePhase(kind,d); if(r && setComputed('tFinal',r.final.t)) solvedKey='tFinal'; }
   } else if(visible[mode].includes(x)){
     const r=solvePhaseNumerically(x, kind);
     if(r!=null && setComputed(x,r)) solvedKey=x;
   }
 }
 const d=getPhaseData(kind, null);
 const canShow = d && computePhase(kind,d);
 steps.push(`<div class="step"><b>1) Princip výpočtu</b><p>${canShow ? (kind==='boil' ? 'Převedeme jednu vodu a jednu páru na ' + phaseReferenceText(kind,d) + '.' : 'Převedeme jeden led a jednu vodu na ' + phaseReferenceText(kind,d) + '.') : (kind==='boil'?'Převedeme jednu vodu a jednu páru na vodu o teplotě varu.':'Převedeme jeden led a jednu vodu na vodu o teplotě tání.')}</p>${phaseMainEquation(kind)}<p class="small">Tepla počítáme jako kladné částky. V bilanci je pak odečítáme podle toho, jestli je daná část odevzdává, nebo přijímá.</p></div>`);
 if(solvedKey && canShow){
   const r=computePhase(kind,d);
   if(solvedKey!=='tFinal'){
     steps.push(`<div class="step"><b>2) Dopočítání vybrané neznámé ${labelFor(solvedKey)[0]}</b><p>Vybraná veličina se dopočítala tak, aby po energetické bilanci vyšla zadaná výsledná teplota.</p>\\[${variableLatex(solvedKey)}=${latexNum(val(solvedKey), (solvedKey.startsWith('c')||solvedKey.startsWith('l'))?0:2)}\\]</div>`);
   }
   let n = solvedKey==='tFinal' ? 2 : 3;
   const partRows = r.rows.map((row)=>{
     const action = row.role==='releases' ? 'teplo odevzdává' : (row.role==='absorbs' ? 'teplo přijímá' : 'bez výměny tepla vůči referenčnímu stavu');
     return `<p><b>${fmt(row.m)} kg ${phaseMaterialName(kind,row.T,d,row.mk)} o teplotě ${fmt(row.T)} °C na ${phaseReferenceText(kind,d)}</b> ⇒ ${action}.</p>\\[${phaseQFormula(row,kind,d)}\\]`;
   }).join('');
   steps.push(`<div class="step"><b>${n++}) Převod jednotlivých částí</b>${partRows}</div>`);
   steps.push(`<div class="step"><b>${n++}) Celková bilance</b>\\[${phaseBalanceLatex(r)}\\]\\[m_\\text{celk}=${r.rows.map(row=>`m_${row.mk.replace('m','')}`).join('+')}=${latexNum(r.totalMass)}\\,\\mathrm{kg}\\]</div>`);
   steps.push(`<div class="step"><b>${n}) Výsledek</b><p>${r.final.note}</p>${phaseFinalMath(kind,r,d)}<p><b>Výsledná teplota: ${fmt(r.final.t)} °C</b></p></div>`);
 }
 return {changed:!!solvedKey, steps, ready:!!solvedKey, missingInputs:phaseMissingInputs(kind, currentUnknown())};
}

function randInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function nice(v,d=2){ return String(Math.round(v*Math.pow(10,d))/Math.pow(10,d)).replace('.',','); }
function resetValues(){ for(const k in values) delete values[k]; for(const k in computed) delete computed[k]; }
function fillObject(obj){ resetValues(); for(const [k,v] of Object.entries(obj)) values[k]=nice(v, (k==='c1'||k==='c2'||k==='Ck'||k==='cIce'||k==='cWater'||k==='cSteam'||k==='lT'||k==='lV')?0:2); }
function generateRandomExample(){
 if(mode==='mix' || mode==='mixCal'){
   const includeCal = mode==='mixCal';
   const cOptions=[4200,3900,2500,900,840,460];
   let obj={
     m1: randInt(20,90)/100,
     c1: pick(cOptions),
     t1: randInt(50,95),
     m2: randInt(20,120)/100,
     c2: pick(cOptions),
     t2: randInt(5,30)
   };
   if(includeCal){ obj.Ck=randInt(40,250); obj.tk=obj.t2; }
   obj.t=(obj.m1*obj.c1*obj.t1+obj.m2*obj.c2*obj.t2+(includeCal?obj.Ck*obj.tk:0))/(obj.m1*obj.c1+obj.m2*obj.c2+(includeCal?obj.Ck:0));
   const unknowns = includeCal ? ['t','t1','t2','m1','m2','c1','c2','Ck','tk'] : ['t','t1','t2','m1','m2','c1','c2'];
   const selected = currentUnknown();
   const missing = unknowns.includes(selected) ? selected : 't';
   fillObject(obj);
   unknownByMode[mode]=missing;
   delete values[missing]; delete computed[missing];
   renderFields(); calculate();
   return;
 }
 if(mode==='melt'){
   const obj={
     m1: randInt(5,45)/100, t1: -randInt(5,20),
     m2: randInt(30,140)/100, t2: randInt(15,70),
     cIce:2100, cWater:4200, tM:0, lT:334000
   };
   const d={...obj, parts:[['m1','t1'],['m2','t2']]};
   obj.tFinal = computePhase('melt', d).final.t;
   const unknowns=['m1','t1','m2','t2','cIce','cWater','tM','lT','tFinal'];
   const selected=currentUnknown();
   const missing=unknowns.includes(selected) ? selected : 'tFinal';
   fillObject(obj);
   unknownByMode[mode]=missing;
   delete values[missing]; delete computed[missing];
   renderFields(); calculate();
   return;
 }
 if(mode==='boil'){
   const obj={
     m1: randInt(50,200)/100, t1: randInt(10,70),
     m2: randInt(10,80)/100, t2: randInt(100,140),
     cWater:4200, cSteam:1840,
     tB:100, lV:2260000
   };
   const d={...obj, parts:[['m1','t1'],['m2','t2']]};
   obj.tFinal = computePhase('boil', d).final.t;
   const unknowns=['m1','t1','m2','t2','cWater','cSteam','tB','lV','tFinal'];
   const selected=currentUnknown();
   const missing=unknowns.includes(selected) ? selected : 'tFinal';
   fillObject(obj);
   unknownByMode[mode]=missing;
   delete values[missing]; delete computed[missing];
   renderFields(); calculate();
   return;
 }
}


function typesetMath(){
 const nodes = [$('steps'), $('equation')].filter(Boolean);
 if(window.MathJax && MathJax.typesetPromise){
   try{ if(MathJax.typesetClear) MathJax.typesetClear(nodes); }catch(e){}
   MathJax.typesetPromise(nodes).catch(err=>console.warn('MathJax typeset failed:', err));
 }
}
window.typesetMath = typesetMath;

function calculate(){
 const r = (mode==='mix')?solveLinear(false):(mode==='mixCal')?solveLinear(true):(mode==='melt')?solvePhase('melt'):solvePhase('boil');
 renderFieldsPreserveFocus();
 const u=currentUnknown();
 $('status').textContent = r.ready ? `Dopočítaná neznámá: ${labelFor(u)[0]}` : `Zatím chybí hodnoty pro ${labelFor(u)[0]}`;
 $('equation').innerHTML = `<span class="pill">${modes.find(m=>m.id===mode).name}</span><span class="pill">neznámá: ${labelFor(u)[0]}</span>`;
 const missing = (r.missingInputs && r.missingInputs.length) ? ` Chybí ještě: ${r.missingInputs.map(k=>labelFor(k)[0]).join(', ')}.` : '';
 const warnBase = (mode==='melt'||mode==='boil') ? 'Doplň hodnoty u obou látek a konstant.' : 'Doplň hodnoty ve všech polích kromě zaškrtnuté neznámé.';
 $('steps').innerHTML = r.steps.join('') + (!r.ready?`<div class="warn">${warnBase}${missing}</div>`:'');
 typesetMath();
}
function renderFieldsPreserveFocus(){ const active=document.activeElement; const id=active&&active.id; const pos=active&&active.selectionStart; renderFields(); if(id && $(id) && id!==currentUnknown() && !computed[id]){ $(id).focus(); try{$(id).setSelectionRange(pos,pos)}catch(e){} } }
$('randomExample').onclick=generateRandomExample; $('clearAll').onclick=clearAll;
renderModes(); renderFields(); calculate();
window.addEventListener('load', () => setTimeout(typesetMath, 0));
</script>
